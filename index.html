<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <main class="container-fluid">
        <div class="container p-5 mt-3 bg-light text-dark rounded shadow-lg">
            <div class="text-center mb-5">
                <img src="cinema.png" alt="Cinema" width="100"><br>
                <br><h1><span class="text-success"><strong>CineSophia's</strong></span> Movies</h1>
            </div>
            <div class="bg-white p-4 rounded mb-4 shadow-sm">
                <div class="row align-items-center">
                    <div class="col-md-20">
                        <h4 class="mb-3"><strong>Student Details</strong></h4>
                        <div class="mb-5">
                            <label class="form-label">Full Name:</label>
                            <input type="text" id="fname" class="form-control" placeholder="John Doe">
                        </div>
                        <h4 class="mb-3"><strong>Ticket Selection</strong></h4>
                        <div class="mb-5">
                            <label class="form-label">Quantity:</label>
                            <input type="number" id="ticket" class="form-control" value="3">
                        </div>
                        <div class="container p-5 rounded mt-3 shadow-sm bg-light">
                            <h4 class="mb-3"><strong>Payment Details</strong></h4><br><hr>
                            <div class="mb-5"><br>
                                <label class="form-label">Subtotal:</label>
                                <input type="number" id="stotal" class="readonly" placeholder="250" value="0" readonly><br><br>
                                <label class="form-label">Admin Fee:</label>
                                <input type="number" id="adfee" class="readonly" placeholder="250" value="50" readonly><br><br>
                                <h1><bold>Total:</bold></h1>
                                <input type="number" id="total" class="readonly" placeholder="300" value="0" readonly>
                            </div>
                        </div>
                    </div>
                    <div class="button-container d-flex justify-content-evenly col-20">
                        <button class="btn btn-success mt-4 p-2 w-25" onclick="calculateTotal()">Total</button>
                        <button class="btn btn-success mt-4 p-2 w-25" onclick="window.location.reload()">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
    <script src="main.js"></script>
</html>
